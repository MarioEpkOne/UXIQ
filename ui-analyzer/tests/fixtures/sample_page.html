<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UXIQ capture fixture</title>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    h1 { margin: 8px 16px; }
    #logo { display: block; margin: 4px 8px; width: 64px; height: 64px; background: #ddd; }
    #email { display: block; margin: 8px 16px; width: 240px; height: 32px; }
    #signup { display: block; margin: 16px 16px; width: 120px; height: 40px; }
    #hidden-btn { display: none; }
    #fading-btn { opacity: 0; }
    #wide-btn { display: block; margin: 16px 0 16px 0; width: 2000px; height: 40px; }
    #footer-link { position: absolute; top: 2000px; left: 16px; }
  </style>
</head>
<body>
  <img id="logo" src="about:blank" alt="logo">
  <h1>Welcome</h1>
  <input id="email" type="email" placeholder="Email">
  <button id="signup">Sign up</button>
  <p id="subtext" style="color: #666; background: #fff; font-size: 14px; margin: 8px 16px;">Muted subtext</p>
  <span id="badge" style="color: rgb(80, 60, 160); font-size: 13px; font-weight: 600; background: #fff;">Version 2</span>
  <button id="outlined" style="background: #fff; border: 1px solid #ccc; color: #111; font-size: 16px; margin: 8px 16px;">Outlined</button>
  <a id="inline-link" href="#" style="color: #0066ff; text-decoration: none;">inline link</a>
  <span id="wrapper-only"><em>nested</em></span>
  <button id="hidden-btn">Hidden</button>
  <button id="fading-btn">Fading</button>
  <button id="wide-btn">Wide</button>
  <a id="footer-link" href="#footer">Footer link</a>
</body>
</html>
